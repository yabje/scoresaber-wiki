project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: .
preserve_hierarchy: true

files:
  - source: /content/docs/**/*.md
    translation: /content/docs/**/%file_name%.%locale%.%file_extension%
    update_option: update_as_unapproved
    ignore:
      - /content/docs/**/*.??.md
      - /content/docs/**/*.??-??.md
  - source: /content/docs/**/*.json
    translation: /content/docs/**/%file_name%.%locale%.%file_extension%
    update_option: update_as_unapproved
    ignore:
      - /content/docs/**/*.??.json
      - /content/docs/**/*.??-??.json
